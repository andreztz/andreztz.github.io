sudo: false
language: python
python:
  - "3.5"
branches:
  only:
  - pelican
before_install:
# troque a linha abaixo pelo resultado do comando:
# travis encrypt-file publish-key
# porém mantenha o final:
# -out ~/.ssh/publish-key -d
- openssl aes-256-cbc -K $encrypted_7937d42399ea_key -iv $encrypted_7937d42399ea_iv -in .travisdeploykey.enc -out ~/.ssh/.travisdeploykey -d
- chmod u=rw,og= ~/.ssh/.travisdeploykey
- echo "Host github.com" >> ~/.ssh/config
- echo "  IdentityFile ~/.ssh/.travisdeploykey" >> ~/.ssh/config
# substitua git@github.com:humrochagf/humrochagf.github.io.git
# pelo endereço de acesso ssh do seu repositório
- git remote set-url origin git@github.com:andreztz/andreztz.github.io.git
# Caso esteja montando a página de projeto troque master:master
# por gh-pages:gh-pages
- git fetch origin -f master:master
install:
- pip install --upgrade pip
- pip install -r requirements.txt
- git clone https://github.com/getpelican/pelican-plugins
script:
- make github